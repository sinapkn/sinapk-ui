<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINAPK Neon Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Tahoma,sans-serif;
}

body{
min-height:100vh;
padding:20px;
color:#fff;
overflow-x:hidden;

background:
radial-gradient(circle at top right,#00ff9d55 0%,transparent 35%),
radial-gradient(circle at bottom left,#00e5ff55 0%,transparent 35%),
#050b10;
}

.container{
max-width:1400px;
margin:auto;
}

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 8px 32px rgba(0,0,0,.25);
align-items:center;
justify-content:center;
text-align:center;
}

.header{
padding:35px;
border-radius:32px;
margin-bottom:20px;
background:rgba(0,255,157,.08);
align-items:center;
justify-content:center;
text-align:center;
}

.logo{
font-size:52px;
font-weight:900;
background:linear-gradient(90deg,#00ff9d,#00e5ff,#00ff9d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
opacity:.7;
margin-top:8px;
font-size:15px;
}

/* ✅ STATS (NEW MINIMAL DESIGN) */
.stats{
display:grid;
grid-template-columns:1fr;
margin-bottom:20px;
}

.stat.single{
display:flex;
align-items:center;
justify-content:space-between;
border-radius:12px;
}

.stat-item{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.label{
font-size:13px;
opacity:.7;
}

.num{
font-size:28px;
font-weight:800;
background:linear-gradient(90deg,#00ff9d,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.online{
animation:pulse 1.8s infinite;
border-radius:12px;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(0,255,157,.5);}
70%{box-shadow:0 0 0 10px rgba(0,255,157,0);}
100%{box-shadow:0 0 0 0 rgba(0,255,157,0);}
}

.divider{
width:1px;
height:35px;
background:rgba(255,255,255,.1);
margin:0 15px;
}
 
.search{
width:100%;
height:60px;
padding:0 20px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.05);
color:white;
font-size:16px;
margin-bottom:20px;
transition:.3s;
}

.search:focus{
outline:none;
border-color:#00ff9d;
box-shadow:0 0 0 4px rgba(0,255,157,.15);
}

.actions{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:18px;
}

.card{
position:relative;
overflow:hidden;

padding:22px;
border-radius:28px;

background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

transition:.35s;

animation:show .5s ease;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
border-color:#00ff9d;
box-shadow:0 20px 60px rgba(0,255,157,.25);
}

.card::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:2px;
background:linear-gradient(90deg,transparent,#00ff9d,transparent);
transition:.8s;
}

.card:hover::before{
left:100%;
}

.title{
font-size:20px;
font-weight:800;
}

.meta{
margin-top:8px;
opacity:.8;
}

.buttons{
display:flex;
gap:10px;
margin-top:18px;
}

.btn{
flex:1;
height:50px;
border:none;
border-radius:16px;
cursor:pointer;
font-weight:700;
color:white;
background:linear-gradient(135deg,#00ff9d,#00e5ff);
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,255,157,.35);
}

.footer{
text-align:center;
margin-top:40px;
opacity:.5;
letter-spacing:2px;
font-size:14px;
}

#toast{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(135deg,#00ff9d,#00e5ff);
padding:14px 22px;
border-radius:16px;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:9999;
}

@keyframes show{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:none;}
}

/* 📱 MOBILE */
@media(max-width:768px){

.logo{font-size:38px;}

.stat.single{
padding:14px 16px;
}

.num{
font-size:22px;
}

.cards{
grid-template-columns:1fr;
}
 
.card .btn{
height:90px;
font-size:16px;
border-radius:17px;
padding:0 16px;
}

.btn{
height:60px;
font-size:17px;
border-radius:18px;
padding:0 20px;
width:100%;
}

.buttons{
flex-direction:column;
gap:12px;
}
}
}
</style>
</head>

<body>

<div class="container">

<div class="glass header">
<div class="logo">SINAPK</div>
<div class="sub">Neon Cyber Dashboard</div>
</div>

<!-- ✅ MINIMAL STATS -->
<div class="stats">
<div class="glass stat single">

<div class="stat-item">
<div class="label">Servers</div>
<div class="num" id="serverCount">0</div>
</div>

<div class="divider"></div>

<div class="stat-item">
<div class="label">Status</div>
<div class="num online">ONLINE</div>
</div>

</div>
</div>

<input type="text" class="search" placeholder="جستجوی سرور ..." id="searchInput">

<div class="actions">
<button class="btn" onclick="copySub()">📋 Copy Subscription</button>
</div>

<div class="cards" id="cardsContainer"></div>

<div class="footer">© 2026 SINAPK</div>

</div>

<div id="toast"></div>

<script>

const SUB_URL =
"";

function toast(msg){
const t=document.getElementById('toast');
t.textContent=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,2000);
}

function copySub(){
navigator.clipboard.writeText(SUB_URL)
.then(()=>toast("Subscription Copied ✓"));
}

fetch('servers.json')
.then(r=>r.json())
.then(servers=>{

const container=document.getElementById('cardsContainer');
document.getElementById('serverCount').textContent=servers.length;

let html='';

servers.forEach(server=>{

html+=`
<div class="card" data-search="${server.name} ${server.protocol} ${server.port}">

<div class="title">${server.name}</div>

<div class="meta">🌐 Protocol: ${server.protocol}</div>
<div class="meta">🔌 Port: ${server.port}</div>

<div class="server-data" style="display:none">${server.link}</div>

<div class="buttons">
<button class="btn copyBtn"> Copy</button>
<button class="btn qrBtn"> QR</button>
</div>

</div>`;
});

container.innerHTML=html;

document.querySelectorAll('.copyBtn').forEach(btn=>{
btn.onclick=function(){
const link=this.closest('.card').querySelector('.server-data').textContent.trim();
navigator.clipboard.writeText(link);
toast("Copied ✓");
};
});

document.querySelectorAll('.qrBtn').forEach(btn=>{
btn.onclick=function(){
const link=this.closest('.card').querySelector('.server-data').textContent.trim();
window.open('https://api.qrserver.com/v1/create-qr-code/?size=500x500&data='+encodeURIComponent(link));
};
});

});

document.getElementById('searchInput').addEventListener('input',function(){
const value=this.value.toLowerCase();

document.querySelectorAll('.card').forEach(card=>{
const text=card.dataset.search.toLowerCase();
card.style.display=text.includes(value)?'':'none';
});
});

</script>

</body>
</html>
