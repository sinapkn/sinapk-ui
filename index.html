<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINAPK Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Tahoma,sans-serif}
body{
background:#0b1020;
color:#fff;
padding:24px;
background-image:
linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
background-size:40px 40px;
}
.container{max-width:1400px;margin:auto}
.header{
padding:30px;
border-radius:28px;
background:#121a31;
border:1px solid rgba(255,255,255,.08);
margin-bottom:20px;
}
.logo{font-size:42px;font-weight:900}
.sub{opacity:.7;margin-top:8px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px}
.stat{
background:#121a31;
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:20px;
}
.num{font-size:34px;font-weight:800;margin-top:8px}
.search{
width:100%;padding:16px;border-radius:18px;border:none;
background:#121a31;color:white;margin-bottom:20px;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:18px;
}
.card{
background:#121a31;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:22px;
transition:.25s;
}
.card:hover{
transform:translateY(-6px);
border-color:#4f46e5;
}
.title{font-size:20px;font-weight:700}
.meta{margin-top:8px;opacity:.8}
.btn{
margin-top:16px;
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:700;
color:white;
background:linear-gradient(90deg,#4f46e5,#7c3aed);
  @media (max-width:768px){

body{
    padding:12px;
}

.header{
    padding:18px;
}

.logo{
    font-size:28px;
}

.sub{
    font-size:13px;
}

.stats{
    grid-template-columns:1fr;
    gap:12px;
}

.stat{
    padding:16px;
}

.num{
    font-size:26px;
}

.search{
    padding:14px;
    font-size:14px;
}

.cards{
    grid-template-columns:1fr;
    gap:14px;
}

.card{
    padding:18px;
}

.title{
    font-size:16px;
}

.meta{
    font-size:13px;
}

.buttons{
    flex-direction:column;
}

.btn{
    width:100%;
    min-height:48px;
    font-size:15px;
}

.footer{
    font-size:12px;
}
}
}
.footer{text-align:center;margin-top:30px;opacity:.5}
</style>

</head>
<body>
<div class="container">
<div class="glass header">
<div class="logo">SINAPK</div>
<div class="sub">Premium Glass Dashboard</div>
</div>

<div class="stats">
<div class="glass stat"><div>Servers</div><div class="num" id="serverCount">0</div></div>
<div class="glass stat"><div>Status</div><div class="num">ONLINE</div></div>
<div class="glass stat"><div>Protocol</div><div class="num">VLESS</div></div>
</div>

<input class="search" placeholder="جستجوی سرور ...">


<div class="cards" id="cardsContainer"></div>

<script>
fetch('servers.json')
.then(r => r.json())
.then(servers => {
  const container = document.getElementById('cardsContainer');

  servers.forEach(server => {
    container.innerHTML += `
      <div class="glass card">
        <div class="title">${server.name}</div>
        <div class="meta">Protocol: ${server.protocol}</div>
        <div class="meta">Port: ${server.port}</div>

        <div class="server-data" style="display:none">${server.link}</div>

        <div class="buttons">
          <button class="btn copyBtn">Copy</button>
          <button class="btn">QR</button>
        </div>
      </div>`;
  });

  document.querySelectorAll('.copyBtn').forEach(btn => {
    btn.onclick = function() {
      const text = this.closest('.card')
        .querySelector('.server-data')
        .textContent.trim();

      navigator.clipboard.writeText(text);

      this.textContent = 'Copied ✓';
      setTimeout(() => this.textContent = 'Copy', 1500);
    };
  });
});
</script>
</div>

<div class="footer">© 2026 SINAPK</div>
</div>

<script>
fetch('servers.json')
.then(r=>r.json())
.then(data=>{
 const el=document.querySelector('#serverCount');
 if(el) el.textContent=data.length;
});
</script>
</body>

</html>
