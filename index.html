<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINAPK Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">


<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;overflow-x:hidden;font-family:Inter,Tahoma,sans-serif}
body{
background:#0b1020;
color:#fff;
padding:16px;
background-image:
linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
background-size:40px 40px;
}
.container{width:100%;max-width:1400px;margin:auto}
.header{
padding:24px;border-radius:24px;
background:#121a31;
border:1px solid rgba(255,255,255,.08);
margin-bottom:16px;
}
.logo{font-size:36px;font-weight:900}
.sub{opacity:.7;margin-top:6px}
.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:16px;
}
.stat{
background:#121a31;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:18px;
}
.num{font-size:30px;font-weight:800;margin-top:8px}
.search{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:#121a31;
color:#fff;
margin-bottom:18px;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:16px;
}
.card{
background:#121a31;
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:18px;
transition:.25s;
}
.card:hover{
transform:translateY(-4px);
border-color:#4f46e5;
}
.title{font-size:18px;font-weight:700;word-break:break-word}
.meta{margin-top:8px;opacity:.8;word-break:break-word}
.buttons{display:flex;gap:10px;margin-top:16px}
.btn{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-weight:700;
color:#fff;
cursor:pointer;
background:linear-gradient(90deg,#4f46e5,#7c3aed);
}
.footer{text-align:center;margin-top:24px;opacity:.5}

@media (max-width:768px){
body{padding:12px}
.logo{font-size:28px}
.stats{grid-template-columns:1fr}
.cards{grid-template-columns:1fr}
.buttons{flex-direction:column}
.btn{width:100%}
}
</style>


</head>
<body>
<div class="container">
<div class="glass header">
<div class="logo">SINAPK</div>
<div class="sub">Premium Glass Dashboard</div>
</div>

<div class="stats">
<div class="glass stat"><div>Servers</div><div class="num" id="serverCount">0</div></div>
<div class="glass stat"><div>Status</div><div class="num">ONLINE</div></div>
<div class="glass stat"><div>Protocol</div><div class="num">VLESS</div></div>
</div>

<input class="search" placeholder="جستجوی سرور ...">


<div class="cards" id="cardsContainer"></div>

<script>
fetch('servers.json')
.then(r => r.json())
.then(servers => {
  const container = document.getElementById('cardsContainer');

  servers.forEach(server => {
    container.innerHTML += `
      <div class="glass card">
        <div class="title">${server.name}</div>
        <div class="meta">Protocol: ${server.protocol}</div>
        <div class="meta">Port: ${server.port}</div>

        <div class="server-data" style="display:none">${server.link}</div>

        <div class="buttons">
          <button class="btn copyBtn">Copy</button>
          <button class="btn">QR</button>
        </div>
      </div>`;
  });

  document.querySelectorAll('.copyBtn').forEach(btn => {
    btn.onclick = function() {
      const text = this.closest('.card')
        .querySelector('.server-data')
        .textContent.trim();

      navigator.clipboard.writeText(text);

      this.textContent = 'Copied ✓';
      setTimeout(() => this.textContent = 'Copy', 1500);
    };
  });
});
</script>
</div>

<div class="footer">© 2026 SINAPK</div>
</div>

<script>
fetch('servers.json')
.then(r=>r.json())
.then(data=>{
 const el=document.querySelector('#serverCount');
 if(el) el.textContent=data.length;
});
</script>
</body>

</html>
