<!DOCTYPE html>

<html dir="rtl" lang="fa">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SINAPK Dashboard</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Tahoma,sans-serif}
body{
min-height:100vh;
background:
radial-gradient(circle at top left,#4f46e5,transparent 35%),
radial-gradient(circle at bottom right,#7c3aed,transparent 35%),
#050816;
color:white;padding:24px}
.container{max-width:1200px;margin:auto}
.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,.15);
border-radius:24px;
}
.header{padding:24px;margin-bottom:20px}
.logo{font-size:36px;font-weight:bold}
.sub{opacity:.8;margin-top:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:20px}
.stat{padding:20px}
.num{font-size:32px;font-weight:bold;margin-top:10px}
.search{width:100%;padding:16px;border:none;border-radius:18px;margin-bottom:20px;background:rgba(255,255,255,.08);color:white}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
.card{padding:20px;transition:.25s}
.card:hover{transform:translateY(-4px)}
.title{font-size:18px;font-weight:bold}
.meta{opacity:.8;margin-top:10px}
.buttons{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:10px;border:none;border-radius:12px;background:rgba(255,255,255,.12);color:white}
.footer{text-align:center;opacity:.6;margin-top:30px}
</style>
</head>
<body>
<div class="container">
<div class="glass header">
<div class="logo">SINAPK</div>
<div class="sub">Premium Glass Dashboard</div>
</div>
<div class="stats">
<div class="glass stat"><div>Servers</div><div class="num">18</div></div>
<div class="glass stat"><div>Status</div><div class="num">ONLINE</div></div>
<div class="glass stat"><div>Protocol</div><div class="num">VLESS</div></div>
</div>
<input class="search" placeholder="جستجوی سرور ..."/>
<div class="cards">
<div class="glass card">
<div class="title">🇩🇪 Germany TLS</div>
<div class="meta">Protocol: VLESS</div>
<div class="meta">Port: 443</div>
<div class="server-data" style="display:none;">vless://GERMANY_SERVER_LINK</div><div class="buttons"><button class="btn copyBtn">Copy</button><button class="btn">QR</button></div>
</div>
<div class="glass card">
<div class="title">🇳🇱 Netherlands</div>
<div class="meta">Protocol: VLESS</div>
<div class="meta">Port: 2096</div>
<div class="server-data" style="display:none;">vless://NETHERLANDS_SERVER_LINK</div><div class="buttons"><button class="btn copyBtn">Copy</button><button class="btn">QR</button></div>
</div>
<div class="glass card">
<div class="title">🇫🇷 France</div>
<div class="meta">Protocol: VLESS</div>
<div class="meta">Port: 2086</div>
<div class="server-data" style="display:none;">vless://FRANCE_SERVER_LINK</div><div class="buttons"><button class="btn copyBtn">Copy</button><button class="btn">QR</button></div>
</div>
</div>
<div class="footer">© 2026 SINAPK</div>
</div>
<script>
document.querySelectorAll('.copyBtn').forEach(btn=>{
 btn.addEventListener('click',function(){
   const text=this.closest('.card').querySelector('.server-data').textContent.trim();
   navigator.clipboard.writeText(text).then(()=>{
      this.textContent='Copied ✓';
      setTimeout(()=>{this.textContent='Copy';},1500);
   });
 });
});
</script></body>
</html>
