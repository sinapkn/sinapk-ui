<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>SINAPK | داشبورد نئون</title>

<!-- 🔤 فونت‌های فارسی حرفه‌ای -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --neon-green:#00ff9d;
  --neon-cyan:#00e5ff;
  --neon-purple:#b14dff;
  --bg-dark:#050b10;
  --glass-bg:rgba(255,255,255,.04);
  --glass-border:rgba(255,255,255,.08);
  --text-primary:#ffffff;
  --text-secondary:rgba(255,255,255,.7);
  --text-muted:rgba(255,255,255,.5);
  --radius-sm:12px;
  --radius-md:18px;
  --radius-lg:28px;
  --radius-xl:36px;
  --transition-fast:.25s cubic-bezier(.4,0,.2,1);
  --transition-smooth:.4s cubic-bezier(.4,0,.2,1);
  --shadow-glow:0 10px 40px rgba(0,255,157,.15);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{scroll-behavior:smooth;}

body{
  font-family:'Vazirmatn',system-ui,sans-serif;
  font-weight:400;
  min-height:100vh;
  color:var(--text-primary);
  overflow-x:hidden;
  background:var(--bg-dark);
  line-height:1.6;
  position:relative;
  padding:20px;
}

/* 🎨 پس‌زمینه متحرک */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%,rgba(0,255,157,.18) 0%,transparent 40%),
    radial-gradient(circle at 85% 80%,rgba(0,229,255,.18) 0%,transparent 40%),
    radial-gradient(circle at 50% 50%,rgba(177,77,255,.08) 0%,transparent 50%);
  z-index:-2;
  animation:bgShift 20s ease-in-out infinite alternate;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:40px 40px;
  z-index:-1;
  pointer-events:none;
}

@keyframes bgShift{
  0%{transform:scale(1) translate(0,0);}
  100%{transform:scale(1.1) translate(-2%,-2%);}
}

.container{
  max-width:1400px;
  margin:0 auto;
  animation:fadeInUp .8s ease;
}

/* 🪟 کلاس شیشه‌ای عمومی */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--glass-border);
  box-shadow:
    0 8px 32px rgba(0,0,0,.25),
    inset 0 1px 0 rgba(255,255,255,.05);
}

/* 🎯 هدر */
.header{
  padding:40px 30px;
  border-radius:var(--radius-xl);
  margin-bottom:24px;
  text-align:center;
  position:relative;
  overflow:hidden;
  background:
    linear-gradient(135deg,rgba(0,255,157,.08),rgba(0,229,255,.05));
}

.header::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:conic-gradient(from 0deg,transparent,rgba(0,255,157,.1),transparent 30%);
  animation:rotate 8s linear infinite;
  opacity:.5;
}

.header > *{position:relative;z-index:1;}

@keyframes rotate{
  to{transform:rotate(360deg);}
}

.logo{
  font-size:clamp(40px,8vw,64px);
  font-weight:900;
  letter-spacing:-1px;
  background:linear-gradient(135deg,var(--neon-green) 0%,var(--neon-cyan) 50%,var(--neon-green) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
  text-shadow:0 0 60px rgba(0,255,157,.3);
}

@keyframes shine{
  to{background-position:200% center;}
}

.sub{
  color:var(--text-secondary);
  margin-top:10px;
  font-size:15px;
  font-weight:500;
  letter-spacing:3px;
}

/* 📊 آمار */
.stats{
  margin-bottom:24px;
}

.stat.single{
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:22px 20px;
  border-radius:var(--radius-lg);
  gap:10px;
  flex-wrap:wrap;
}

.stat-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  min-width:100px;
  flex:1;
}

.label{
  font-size:13px;
  color:var(--text-muted);
  font-weight:500;
}

.num{
  font-size:32px;
  font-weight:800;
  background:linear-gradient(135deg,var(--neon-green),var(--neon-cyan));
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  font-variant-numeric:tabular-nums;
}

.online{
  position:relative;
  padding:6px 16px;
  border-radius:100px;
  background:rgba(0,255,157,.1);
  border:1px solid rgba(0,255,157,.3);
  font-size:13px;
  font-weight:700;
  color:var(--neon-green);
  display:inline-flex;
  align-items:center;
  gap:8px;
}

.online::before{
  content:"";
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--neon-green);
  box-shadow:0 0 10px var(--neon-green);
  animation:blink 1.5s ease-in-out infinite;
}

@keyframes blink{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.5;transform:scale(.8);}
}

.divider{
  width:1px;
  height:40px;
  background:linear-gradient(to bottom,transparent,var(--glass-border),transparent);
  margin:0 8px;
}

/* 🔍 جستجو */
.search-wrapper{
  position:relative;
  margin-bottom:20px;
}

.search-icon{
  position:absolute;
  right:22px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-muted);
  pointer-events:none;
  transition:var(--transition-fast);
}

.search{
  width:100%;
  height:62px;
  padding:0 60px 0 20px;
  border-radius:var(--radius-md);
  border:1px solid var(--glass-border);
  background:var(--glass-bg);
  backdrop-filter:blur(20px);
  color:var(--text-primary);
  font-size:15px;
  font-family:inherit;
  font-weight:500;
  transition:var(--transition-smooth);
}

.search::placeholder{color:var(--text-muted);}

.search:focus{
  outline:none;
  border-color:var(--neon-green);
  background:rgba(0,255,157,.05);
  box-shadow:
    0 0 0 4px rgba(0,255,157,.1),
    0 8px 32px rgba(0,255,157,.15);
}

.search:focus ~ .search-icon{color:var(--neon-green);}

/* 🎬 دکمه‌های اکشن */
.actions{
  display:flex;
  gap:12px;
  margin-bottom:24px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  min-width:180px;
  height:56px;
  border:none;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-family:inherit;
  font-weight:700;
  font-size:15px;
  color:#050b10;
  background:linear-gradient(135deg,var(--neon-green),var(--neon-cyan));
  transition:var(--transition-smooth);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  position:relative;
  overflow:hidden;
  box-shadow:0 4px 20px rgba(0,255,157,.2);
}

.btn::before{
  content:"";
  position:absolute;
  top:0;
  right:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  transition:.6s;
}

.btn:hover::before{right:100%;}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 30px rgba(0,255,157,.4);
}

.btn:active{transform:translateY(-1px);}

.btn.secondary{
  background:var(--glass-bg);
  color:var(--text-primary);
  border:1px solid var(--glass-border);
  box-shadow:none;
}

.btn.secondary:hover{
  border-color:var(--neon-cyan);
  background:rgba(0,229,255,.08);
  box-shadow:0 8px 25px rgba(0,229,255,.2);
}

/* 🃏 کارت‌ها */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:18px;
}

.card{
  position:relative;
  padding:24px;
  border-radius:var(--radius-lg);
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--glass-border);
  transition:var(--transition-smooth);
  animation:cardIn .6s ease backwards;
  overflow:hidden;
}

.card:nth-child(1){animation-delay:.05s;}
.card:nth-child(2){animation-delay:.1s;}
.card:nth-child(3){animation-delay:.15s;}
.card:nth-child(4){animation-delay:.2s;}
.card:nth-child(5){animation-delay:.25s;}
.card:nth-child(6){animation-delay:.3s;}

@keyframes cardIn{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  right:-100%;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--neon-green),var(--neon-cyan),transparent);
  transition:.8s;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(0,255,157,.08),transparent 40%);
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}

.card:hover{
  transform:translateY(-6px);
  border-color:rgba(0,255,157,.4);
  box-shadow:
    0 20px 50px rgba(0,0,0,.3),
    0 0 40px rgba(0,255,157,.15);
}

.card:hover::before{right:100%;}
.card:hover::after{opacity:1;}

.card-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:18px;
}

.card-icon{
  width:48px;
  height:48px;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(0,255,157,.2),rgba(0,229,255,.2));
  border:1px solid rgba(0,255,157,.2);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  color:var(--neon-green);
}

.title{
  font-size:18px;
  font-weight:800;
  color:var(--text-primary);
  margin-bottom:4px;
}

.meta{
  font-size:13px;
  color:var(--text-secondary);
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:500;
}

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:14px;
  background:rgba(0,0,0,.2);
  border-radius:var(--radius-sm);
  margin-bottom:18px;
  border:1px solid rgba(255,255,255,.03);
}

.info-item{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.info-label{
  font-size:11px;
  color:var(--text-muted);
  font-weight:500;
}

.info-value{
  font-size:14px;
  font-weight:700;
  color:var(--text-primary);
  font-family:'Vazirmatn',monospace;
}

.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card .btn{
  height:48px;
  font-size:14px;
  min-width:0;
}

/* 📱 ریسپانسیو */
@media(max-width:768px){
  body{padding:14px;}

  .header{padding:30px 20px;}
  .sub{font-size:12px;letter-spacing:2px;}

  .stat.single{
    padding:18px 12px;
    gap:8px;
  }

  .stat-item{min-width:80px;}
  .num{font-size:24px;}
  .divider{height:30px;margin:0 4px;}

  .search{height:56px;font-size:14px;padding:0 50px 0 16px;}
  .search-icon{right:18px;}

  .btn{
    height:52px;
    font-size:14px;
    min-width:0;
  }

  .cards{
    grid-template-columns:1fr;
    gap:14px;
  }

  .card{padding:20px;}
  .card .btn{height:46px;font-size:13px;}
}

@media(max-width:380px){
  .logo{font-size:36px;}
  .buttons{grid-template-columns:1fr;}
  .info-grid{grid-template-columns:1fr;}
}

/* 🎉 انیمیشن‌های عمومی */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* 🍞 Toast */
#toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:linear-gradient(135deg,var(--neon-green),var(--neon-cyan));
  color:#050b10;
  padding:14px 26px;
  border-radius:100px;
  font-weight:700;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:var(--transition-smooth);
  z-index:9999;
  box-shadow:0 10px 40px rgba(0,255,157,.4);
  display:flex;
  align-items:center;
  gap:8px;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* 📜 اسکرول‌بار */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,.02);}
::-webkit-scrollbar-thumb{
  background:linear-gradient(var(--neon-green),var(--neon-cyan));
  border-radius:10px;
}

.footer{
  text-align:center;
  margin-top:40px;
  padding:20px;
  color:var(--text-muted);
  font-size:13px;
  font-weight:500;
  letter-spacing:1px;
}

/* 🔄 Loading */
.loader{
  display:flex;
  justify-content:center;
  padding:60px 0;
  gap:8px;
}

.loader span{
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--neon-green);
  animation:bounce 1.4s ease-in-out infinite;
}

.loader span:nth-child(2){animation-delay:.2s;background:var(--neon-cyan);}
.loader span:nth-child(3){animation-delay:.4s;background:var(--neon-purple);}

@keyframes bounce{
  0%,80%,100%{transform:scale(0);opacity:.3;}
  40%{transform:scale(1);opacity:1;}
}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--text-muted);
  grid-column:1/-1;
}
</style>
</head>

<body>

<div class="container">

  <!-- 🎯 هدر -->
  <div class="glass header">
    <div class="logo">SINAPK</div>
    <div class="sub">NEON CYBER DASHBOARD</div>
  </div>

  <!-- 📊 آمار -->
  <div class="stats">
    <div class="glass stat single">
      <div class="stat-item">
        <div class="label">تعداد سرورها</div>
        <div class="num" id="serverCount">0</div>
      </div>
      <div class="divider"></div>
      <div class="stat-item">
        <div class="label">وضعیت</div>
        <div class="online">آنلاین</div>
      </div>
      <div class="divider"></div>
      <div class="stat-item">
        <div class="label">آخرین بروزرسانی</div>
        <div class="num" style="font-size:18px;" id="lastUpdate">--</div>
      </div>
    </div>
  </div>

  <!-- 🔍 جستجو -->
  <div class="search-wrapper">
    <input type="text" class="search" placeholder="جستجوی سرور بر اساس نام، پروتکل یا پورت..." id="searchInput">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </div>

  <!-- 🎬 اکشن‌ها -->
  <div class="actions">
    <button class="btn" onclick="copySub()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      کپی لینک اشتراک
    </button>
    <button class="btn secondary" onclick="refreshData()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      بروزرسانی
    </button>
  </div>

  <!-- 🃏 کارت‌ها -->
  <div class="cards" id="cardsContainer">
    <div class="loader">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="footer">© 2026 SINAPK — طراحی شده با ❤️</div>

</div>

<div id="toast"></div>

<script>
const SUB_URL = "";

// 🍞 Toast
function toast(msg,icon='✓'){
  const t=document.getElementById('toast');
  t.innerHTML=`<span>${icon}</span><span>${msg}</span>`;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2500);
}

// 📋 کپی اشتراک
function copySub(){
  if(!SUB_URL){toast('لینک اشتراک تنظیم نشده','⚠️');return;}
  navigator.clipboard.writeText(SUB_URL)
    .then(()=>toast('لینک اشتراک کپی شد'));
}

// 🔄 بروزرسانی
function refreshData(){
  toast('در حال بروزرسانی...','🔄');
  setTimeout(()=>location.reload(),800);
}

// 🕐 زمان آخرین بروزرسانی
function updateTime(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('lastUpdate').textContent=`${h}:${m}`;
}
updateTime();

// 🎯 افکت موس روی کارت‌ها
function setupCardEffects(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('mousemove',e=>{
      const rect=card.getBoundingClientRect();
      const x=((e.clientX-rect.left)/rect.width)*100;
      const y=((e.clientY-rect.top)/rect.height)*100;
      card.style.setProperty('--mx',x+'%');
      card.style.setProperty('--my',y+'%');
    });
  });
}

// 📡 دریافت سرورها
function loadServers(){
  fetch('servers.json')
    .then(r=>{
      if(!r.ok)throw new Error('Network error');
      return r.json();
    })
    .then(servers=>{
      const container=document.getElementById('cardsContainer');
      document.getElementById('serverCount').textContent=servers.length.toLocaleString('fa-IR');

      if(!servers.length){
        container.innerHTML='<div class="empty-state">سروری یافت نشد</div>';
        return;
      }

      const html=servers.map((s,i)=>`
        <div class="card" data-search="${s.name} ${s.protocol} ${s.port}">
          <div class="card-header">
            <div class="card-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                <line x1="6" y1="6" x2="6.01" y2="6"/>
                <line x1="6" y1="18" x2="6.01" y2="18"/>
              </svg>
            </div>
            <div style="flex:1;min-width:0;">
              <div class="title">${s.name}</div>
              <div class="meta">
                <span style="color:var(--neon-green);">●</span>
                فعال
              </div>
            </div>
          </div>

          <div class="info-grid">
            <div class="info-item">
              <span class="info-label">پروتکل</span>
              <span class="info-value">${s.protocol}</span>
            </div>
            <div class="info-item">
              <span class="info-label">پورت</span>
              <span class="info-value">${s.port}</span>
            </div>
          </div>

          <div class="server-data" style="display:none">${s.link}</div>

          <div class="buttons">
            <button class="btn copyBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              کپی لینک
            </button>
            <button class="btn secondary qrBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
                <line x1="14" y1="14" x2="14" y2="17"/>
                <line x1="17" y1="14" x2="21" y2="14"/>
                <line x1="14" y1="21" x2="21" y2="21"/>
              </svg>
              QR کد
            </button>
          </div>
        </div>
      `).join('');

      container.innerHTML=html;
      setupCardEffects();

      // کپی لینک هر کارت
      document.querySelectorAll('.copyBtn').forEach(btn=>{
        btn.onclick=function(){
          const link=this.closest('.card').querySelector('.server-data').textContent.trim();
          navigator.clipboard.writeText(link);
          toast('لینک سرور کپی شد');
        };
      });

      // QR کد
      document.querySelectorAll('.qrBtn').forEach(btn=>{
        btn.onclick=function(){
          const link=this.closest('.card').querySelector('.server-data').textContent.trim();
          window.open('https://api.qrserver.com/v1/create-qr-code/?size=500x500&data='+encodeURIComponent(link),'_blank');
        };
      });
    })
    .catch(err=>{
      document.getElementById('cardsContainer').innerHTML=
        '<div class="empty-state">⚠️ خطا در دریافت اطلاعات سرورها</div>';
      console.error(err);
    });
}

loadServers();

// 🔍 جستجو
document.getElementById('searchInput').addEventListener('input',function(){
  const value=this.value.trim().toLowerCase();
  let visibleCount=0;

  document.querySelectorAll('.card').forEach(card=>{
    const text=card.dataset.search.toLowerCase();
    const match=text.includes(value);
    card.style.display=match?'':'none';
    if(match)visibleCount++;
  });

  // نمایش پیام خالی
  const container=document.getElementById('cardsContainer');
  const existingEmpty=container.querySelector('.empty-state');
  if(value && visibleCount===0 && !existingEmpty){
    container.innerHTML+='<div class="empty-state">نتیجه‌ای برای "<strong>'+this.value+'</strong>" یافت نشد</div>';
  }else if(existingEmpty && (visibleCount>0 || !value)){
    existingEmpty.remove();
  }
});
</script>

</body>
</html>
